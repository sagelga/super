version: 2
updates:
  # npm dependencies
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
      day: monday
      time: "06:00"
      timezone: Asia/Bangkok
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
        exclude-patterns:
          - "next"
          - "react"
          - "react-dom"
          - "@types/react*"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
      cloudflare:
        patterns:
          - "wrangler"
          - "@cloudflare/*"
          - "@opennextjs/*"
      playwright:
        patterns:
          - "@playwright/test"
    labels:
      - dependencies
      - chore
    commit-message:
      prefix: chore
      include: scope

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      day: monday
      time: "06:00"
      timezone: Asia/Bangkok
    open-pull-requests-limit: 3
    labels:
      - ci
      - dependencies
    commit-message:
      prefix: ci
      include: scope
    groups:
      actions:
        patterns:
          - "*"
