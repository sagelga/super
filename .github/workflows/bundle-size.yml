name: Bundle Size

on:
  pull_request:
    branches:
      - main
    paths:
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - "next.config.mjs"
      - "tailwind.config.mjs"

permissions:
  contents: read
  pull-requests: write

jobs:
  bundle-size:
    name: Bundle size
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Analyze bundle size
        uses: transferwise/actions-next-bundle-analyzer@v2
        with:
          workflow-id: bundle-size.yml
          base-branch: main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
