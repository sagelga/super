name: PR Hygiene

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
    branches:
      - main

permissions:
  pull-requests: write

jobs:
  size-check:
    name: PR size
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            const additions = pr.additions;
            const deletions = pr.deletions;
            const changed = additions + deletions;

            let label = null;
            if (changed <= 50)        label = 'size/XS';
            else if (changed <= 200)  label = 'size/S';
            else if (changed <= 500)  label = 'size/M';
            else if (changed <= 1000) label = 'size/L';
            else                      label = 'size/XL';

            // Remove old size labels
            const allSizeLabels = ['size/XS', 'size/S', 'size/M', 'size/L', 'size/XL'];
            const { data: currentLabels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            for (const l of currentLabels) {
              if (allSizeLabels.includes(l.name)) {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  name: l.name,
                });
              }
            }

            // Apply new size label
            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: [label],
              });
            } catch (e) {
              // Label may not exist yet in the repo — log and continue
              core.warning(`Could not apply label '${label}': ${e.message}`);
            }

            // Warn on XL PRs — only post once (update existing bot comment if present)
            if (changed > 1000) {
              const warningBody = `> [!WARNING]\n> This PR modifies **${changed} lines** (+${additions} / -${deletions}). Note: lockfile changes are included in this count.\n> Consider splitting into smaller PRs for easier review.`;
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
              });
              const existing = comments.find(
                c => c.user.type === 'Bot' && c.body.includes('This PR modifies')
              );
              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body: warningBody,
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: warningBody,
                });
              }
            }

            core.info(`PR size: ${changed} lines (+${additions} / -${deletions}) → ${label}`);

  description-check:
    name: PR description
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            if (body.trim().length < 30) {
              core.setFailed(
                'PR description is too short. Please fill in the PR template (at least 30 characters).'
              );
            }
